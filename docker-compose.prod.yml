# FlexioPage — Production stack for a single VPS (Hostinger / OVH / Hetzner).
#
# Layout:
#   caddy (80/443) ──┬──>  frontend:3000   (Next.js standalone)
#                    └──>  backend:5000    (Express + Mongo client)
#                                  │
#                                  └──>  mongodb:27017  (internal network only)
#
# Backend & frontend are NOT exposed to the public — only Caddy listens
# externally. Caddy handles ALL TLS termination, including auto-issuing
# Let's Encrypt certificates for vendor custom domains via on-demand TLS.
# The cert store is persisted on the `caddy_data` volume.
#
# Usage:
#   cp .env.production.example .env
#   nano .env                          # fill in secrets + DOMAIN
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: flexiopage
    # No ports: section — Mongo is only reachable from inside the compose network.
    networks:
      - flexiopage

  backend:
    build:
      context: ./flexiopage-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind only to localhost — Caddy is the public entry point.
    ports:
      - "127.0.0.1:5000:5000"
    # Passe tout le .env au container en une fois. Sécurise contre l'oubli
    # d'un `VAR: ${VAR}` dans `environment:` — depuis 2026-07-13 (fix Moneroo)
    # où MONEROO_API_KEY était dans le .env mais absente du container faute
    # d'entrée explicite ici. Le bloc `environment:` en-dessous override quand
    # il faut réécrire une valeur (MONGODB_URI pointant sur le service compose,
    # NODE_ENV forcé à production…).
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/flexiopage
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_PATH: /app/uploads
      PUBLIC_URL_PREFIX: /uploads
      # Optional integrations — all empty by default
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FAL_KEY: ${FAL_KEY:-}
      FAL_LLM_MODEL: ${FAL_LLM_MODEL:-}
      FAL_IMAGE_MODEL: ${FAL_IMAGE_MODEL:-}
      LANDING_AI_IMAGES_ENABLED: ${LANDING_AI_IMAGES_ENABLED:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      CINETPAY_API_KEY: ${CINETPAY_API_KEY:-}
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID:-}
      CINETPAY_SECRET_KEY: ${CINETPAY_SECRET_KEY:-}
      CINETPAY_NOTIFY_URL: ${CINETPAY_NOTIFY_URL:-}
      # Flutterwave
      FLW_PUBLIC_KEY: ${FLW_PUBLIC_KEY:-}
      FLW_SECRET_KEY: ${FLW_SECRET_KEY:-}
      FLW_SECRET_HASH: ${FLW_SECRET_HASH:-}
      # Moneroo (Wave/OM/MTN/Moov/cards multi-country African gateway)
      MONEROO_API_KEY: ${MONEROO_API_KEY:-}
      MONEROO_NOTIFY_URL: ${MONEROO_NOTIFY_URL:-}
      MONEROO_WEBHOOK_SECRET: ${MONEROO_WEBHOOK_SECRET:-}
      # Public base URL of the API (used for webhook notify_url + data-deletion status URL)
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      # Custom domain verification — utilisés par /api/stores/:id/verify-domain
      # pour résoudre la cible attendue (CNAME ou IP apex). Doivent matcher la
      # config Caddy + l'IP réelle du VPS, sinon la vérif domain custom échoue
      # avec "dns_not_matching".
      STOREFRONT_HOST: ${STOREFRONT_HOST:-}
      STOREFRONT_IPS: ${STOREFRONT_IPS:-}
      FLEXIOPAGE_WEBHOOK_SECRET: ${FLEXIOPAGE_WEBHOOK_SECRET:-}
      MOGADELIVERY_WEBHOOK_URL: ${MOGADELIVERY_WEBHOOK_URL:-}
      # ── Messenger Bot ──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Si OPENROUTER_API_KEY est défini, le service bascule sur OpenRouter
      # (compatible Messages API). Sinon Anthropic direct.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Override des slugs côté OpenRouter (les slugs réels ne suivent pas
      # toujours la convention auto : claude-haiku-4.5 peut ne pas exister
      # encore alors que claude-3-5-haiku existe). Laisser vide pour utiliser
      # l'auto-convert depuis CLAUDE_MODEL_*.
      OPENROUTER_MODEL_PRIMARY: ${OPENROUTER_MODEL_PRIMARY:-}
      OPENROUTER_MODEL_FALLBACK: ${OPENROUTER_MODEL_FALLBACK:-}
      CLAUDE_MODEL_PRIMARY: ${CLAUDE_MODEL_PRIMARY:-claude-haiku-4-5-20251001}
      CLAUDE_MODEL_FALLBACK: ${CLAUDE_MODEL_FALLBACK:-claude-sonnet-4-5}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      MESSENGER_VERIFY_TOKEN: ${MESSENGER_VERIFY_TOKEN:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-}
      FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v19.0}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      # ── WhatsApp via WasenderAPI ──
      # Base URL Wasender (défaut OK — n'a besoin d'être set que pour staging/tests).
      WASENDER_BASE_URL: ${WASENDER_BASE_URL:-https://www.wasenderapi.com}
      # Secret partagé envoyé à Wasender à la création de session et vérifié
      # sur les webhooks entrants (header X-Webhook-Signature). Sans cette
      # valeur, l'endpoint /webhook/wasender accepte n'importe quel POST.
      WASENDER_WEBHOOK_SECRET: ${WASENDER_WEBHOOK_SECRET:-}
      # Optional — when set, the bot uses BullMQ instead of in-process processing
      REDIS_URL: ${REDIS_URL:-}
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - flexiopage

  frontend:
    build:
      context: ./flexiopage-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STOREFRONT_DOMAIN: ${NEXT_PUBLIC_STOREFRONT_DOMAIN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - flexiopage

  # Caddy v2 — public reverse proxy with auto-TLS.
  # Issues + renews Let's Encrypt certificates via HTTP-01 for:
  #   - the platform apex + www + api,
  #   - every vendor subdomain (*.PLATFORM_APEX) on-demand,
  #   - every seller custom domain on-demand,
  # all gated by the backend's /internal/cert-ask endpoint.
  # Stock caddy:2-alpine — no custom modules needed.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    # Public resolvers — the host's systemd-resolved (127.0.0.53) is not
    # reachable from inside the container, which would break ACME issuance.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PLATFORM_APEX: ${PLATFORM_APEX:-flexiopage.com}
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-admin@flexiopage.com}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data            # cert store + ACME account (must persist!)
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - flexiopage

volumes:
  mongodb_data:
  backend_uploads:
  caddy_data:
  caddy_config:

networks:
  flexiopage:
    driver: bridge
