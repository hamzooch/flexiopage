# FlexioPage — Production stack for a single VPS (Hostinger / OVH / Hetzner).
#
# Layout:
#   caddy (80/443) ──┬──>  frontend:3000   (Next.js standalone)
#                    └──>  backend:5000    (Express + Mongo client)
#                                  │
#                                  └──>  mongodb:27017  (internal network only)
#
# Backend & frontend are NOT exposed to the public — only Caddy listens
# externally. Caddy handles ALL TLS termination, including auto-issuing
# Let's Encrypt certificates for vendor custom domains via on-demand TLS.
# The cert store is persisted on the `caddy_data` volume.
#
# Usage:
#   cp .env.production.example .env
#   nano .env                          # fill in secrets + DOMAIN
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: flexiopage
    # No ports: section — Mongo is only reachable from inside the compose network.
    networks:
      - flexiopage

  backend:
    build:
      context: ./flexiopage-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind only to localhost — Caddy is the public entry point.
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/flexiopage
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_PATH: /app/uploads
      PUBLIC_URL_PREFIX: /uploads
      # Optional integrations — all empty by default
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FAL_KEY: ${FAL_KEY:-}
      FAL_LLM_MODEL: ${FAL_LLM_MODEL:-}
      FAL_IMAGE_MODEL: ${FAL_IMAGE_MODEL:-}
      LANDING_AI_IMAGES_ENABLED: ${LANDING_AI_IMAGES_ENABLED:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      CINETPAY_API_KEY: ${CINETPAY_API_KEY:-}
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID:-}
      CINETPAY_SECRET_KEY: ${CINETPAY_SECRET_KEY:-}
      CINETPAY_NOTIFY_URL: ${CINETPAY_NOTIFY_URL:-}
      # Flutterwave
      FLW_PUBLIC_KEY: ${FLW_PUBLIC_KEY:-}
      FLW_SECRET_KEY: ${FLW_SECRET_KEY:-}
      FLW_SECRET_HASH: ${FLW_SECRET_HASH:-}
      # Public base URL of the API (used for webhook notify_url + data-deletion status URL)
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      FLEXIOPAGE_WEBHOOK_SECRET: ${FLEXIOPAGE_WEBHOOK_SECRET:-}
      MOGADELIVERY_WEBHOOK_URL: ${MOGADELIVERY_WEBHOOK_URL:-}
      # ── Messenger Bot ──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL_PRIMARY: ${CLAUDE_MODEL_PRIMARY:-claude-haiku-4-5-20251001}
      CLAUDE_MODEL_FALLBACK: ${CLAUDE_MODEL_FALLBACK:-claude-sonnet-4-5}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      MESSENGER_VERIFY_TOKEN: ${MESSENGER_VERIFY_TOKEN:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-}
      FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v19.0}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      # Optional — when set, the bot uses BullMQ instead of in-process processing
      REDIS_URL: ${REDIS_URL:-}
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - flexiopage

  frontend:
    build:
      context: ./flexiopage-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STOREFRONT_DOMAIN: ${NEXT_PUBLIC_STOREFRONT_DOMAIN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - flexiopage

  # Caddy v2 — public reverse proxy with auto-TLS.
  # Issues + renews Let's Encrypt certificates for:
  #   - the platform apex/subdomains (DNS-01 via Cloudflare, optional),
  #   - api.${PLATFORM_APEX} (HTTP-01),
  #   - any verified custom domain a vendor connects (HTTP-01 + on-demand TLS,
  #     gated by the backend's /internal/cert-ask endpoint).
  # Uses the caddy:2-alpine image with the Cloudflare DNS module baked in
  # via a tiny Dockerfile (see caddy/Dockerfile) when DNS-01 is needed.
  # If you don't need the wildcard, swap to `image: caddy:2-alpine` and drop
  # the dns directive in caddy/Caddyfile.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    environment:
      PLATFORM_APEX: ${PLATFORM_APEX:-flexiopage.com}
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-admin@flexiopage.com}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data            # cert store + ACME account (must persist!)
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - flexiopage

volumes:
  mongodb_data:
  backend_uploads:
  caddy_data:
  caddy_config:

networks:
  flexiopage:
    driver: bridge
