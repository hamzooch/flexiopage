# BoutShop — nginx reverse proxy with Let's Encrypt SSL.
#
# Before enabling SSL, you must generate the certificates ONCE on the host:
#
#   docker compose -f docker-compose.prod.yml stop nginx
#   sudo apt install certbot
#   sudo certbot certonly --standalone \
#     -d boutshop.tn -d www.boutshop.tn -d api.boutshop.tn \
#     --email you@boutshop.tn --agree-tos --no-eff-email
#   docker compose -f docker-compose.prod.yml up -d nginx
#
# Renewal cron (every 60 days):
#   sudo crontab -e
#   0 3 * * 0 certbot renew --quiet && docker compose -f /opt/boutshop/docker-compose.prod.yml exec nginx nginx -s reload
#
# Replace `boutshop.tn` and `api.boutshop.tn` with your real domains
# everywhere in this file before launching.

# ─── ACME challenge (Let's Encrypt) on every HTTP request ─────────────
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force HTTPS for everything else
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend (Next.js) ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name boutshop.tn www.boutshop.tn;

    ssl_certificate     /etc/letsencrypt/live/boutshop.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boutshop.tn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Generous body limit so logo / hero uploads pass through nginx
    # (multer cap is 25 MB in media.controller.ts).
    client_max_body_size 30M;

    # Real client IP for the Node app
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeout for SSE / streaming AI page generation
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─── Backend API (Express) ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.boutshop.tn;

    ssl_certificate     /etc/letsencrypt/live/boutshop.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boutshop.tn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 30M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://backend:5000;
    }
}
